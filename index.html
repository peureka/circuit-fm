<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Circuit</title>
  <meta name="description" content="A members' club with no house. It moves with you. London 2026.">
  <meta property="og:title" content="Circuit. A members' club with no house.">
  <meta property="og:description" content="It moves with you. London 2026.">
  <meta property="og:image" content="https://circuit.fm/og.png">
  <meta property="og:url" content="https://circuit.fm">
  <meta property="og:type" content="website">
  <meta name="twitter:card" content="summary_large_image">
  <meta name="twitter:title" content="Circuit. A members' club with no house.">
  <meta name="twitter:description" content="It moves with you. London 2026.">
  <meta name="twitter:image" content="https://circuit.fm/og.png">
  <link rel="canonical" href="https://circuit.fm">
  <script defer src="/_vercel/insights/script.js"></script>
  <link rel="icon" href="data:image/svg+xml,<svg xmlns='http://www.w3.org/2000/svg' viewBox='0 0 32 32' fill='none'><rect width='32' height='32' rx='6' fill='%230A0A0A'/><circle cx='16' cy='16' r='9' stroke='%23FF4400' stroke-width='2.5' fill='none'/></svg>">
  <style>
    *, *::before, *::after { margin: 0; padding: 0; box-sizing: border-box; }

    :root {
      --bg: #0A0A0A;
      --text-primary: #F5F5F5;
      --text-secondary: #A0A0A0;
      --text-dim: #666;
      --accent: #FF4400;
      --accent-dim: rgba(255, 68, 0, 0.3);
      --border: rgba(255, 255, 255, 0.08);
      --mono: "SF Mono", "Cascadia Code", "Fira Code", "Consolas", monospace;
      --sans: -apple-system, BlinkMacSystemFont, 'Helvetica Neue', sans-serif;
    }

    html, body { height: 100%; }
    body {
      background: var(--bg);
      color: var(--text-primary);
      font-family: var(--sans);
      -webkit-font-smoothing: antialiased;
      -moz-osx-font-smoothing: grayscale;
      display: flex;
      flex-direction: column;
    }

    /* Nav */
    nav {
      position: fixed;
      top: 0;
      left: 0;
      right: 0;
      z-index: 100;
      display: flex;
      justify-content: space-between;
      align-items: center;
      padding: 20px 24px;
      background: rgba(10, 10, 10, 0.9);
      backdrop-filter: blur(12px);
      -webkit-backdrop-filter: blur(12px);
    }

    .wordmark {
      font-size: 16px;
      font-weight: 600;
      color: var(--text-primary);
      letter-spacing: -0.02em;
      text-decoration: none;
    }

    .nav-links { display: flex; align-items: center; gap: 24px; }
    .nav-links a {
      color: var(--text-primary);
      text-decoration: none;
      font-size: 14px;
      transition: opacity 100ms linear;
    }
    .nav-links a:hover { opacity: 0.7; }
    .nav-links a svg { display: block; width: 18px; height: 18px; }

    /* Hero — fills the viewport. The homepage is signal-only. */
    .hero {
      flex: 1;
      min-height: 100dvh;
      display: flex;
      flex-direction: column;
      justify-content: center;
      align-items: center;
      text-align: center;
      padding: 80px 24px 60px;
      gap: 64px;
    }

    .headline {
      display: flex;
      flex-direction: column;
      align-items: center;
      gap: 20px;
    }

    .brand-ring-scene {
      perspective: 900px;
      width: clamp(100px, 16vw, 180px);
      height: clamp(100px, 16vw, 180px);
      margin-bottom: 8px;
    }
    .brand-ring {
      width: 100%;
      height: 100%;
      border-radius: 50%;
      border: clamp(6px, 1.2vw, 10px) solid var(--accent);
      animation: ring-spin 8s linear infinite;
      transform-style: preserve-3d;
    }
    @keyframes ring-spin {
      0% { transform: rotateY(0deg); }
      100% { transform: rotateY(360deg); }
    }
    @media (prefers-reduced-motion: reduce) {
      .brand-ring { animation: none; }
    }

    .brand {
      font-size: clamp(36px, 8vw, 80px);
      font-weight: 600;
      letter-spacing: -0.03em;
      line-height: 1;
    }

    .subline {
      font-size: clamp(13px, 3vw, 20px);
      font-weight: 400;
      line-height: 1.4;
      color: var(--text-primary);
      letter-spacing: -0.01em;
    }

    /* Supporting line — wraps on small viewports rather than render at
       sub-10px. Per CIRCUIT_FM_DESIGN_BRIEF.md §B.5. */
    .supporting {
      font-size: clamp(12px, 2.6vw, 14px);
      font-weight: 400;
      line-height: 1.5;
      color: var(--text-secondary);
      max-width: 32ch;
    }

    .email-wrap {
      display: flex;
      flex-direction: column;
      align-items: center;
      gap: 12px;
    }

    .join-btn {
      background: var(--accent);
      color: var(--bg);
      font-family: var(--sans);
      font-size: 15px;
      font-weight: 600;
      border: none;
      border-radius: 2px;
      padding: 0 28px;
      height: 46px;
      min-height: 44px;
      cursor: pointer;
      transition: opacity 100ms linear;
    }
    .join-btn:hover { opacity: 0.85; }

    .email-reveal {
      display: flex;
      flex-direction: column;
      align-items: center;
      gap: 12px;
      opacity: 0;
      height: 0;
      overflow: hidden;
      transition: opacity 100ms linear;
    }
    .email-reveal.active { opacity: 1; height: auto; overflow: visible; }
    .email-wrap .join-btn.hidden { display: none; }

    .email-input {
      display: flex;
      align-items: center;
      border: 1px solid var(--accent-dim);
      border-radius: 2px;
      background: rgba(255, 255, 255, 0.05);
      height: 46px;
      max-width: 340px;
      width: 100%;
      padding: 0 14px;
      gap: 10px;
    }
    .email-input input {
      flex: 1;
      background: none;
      border: none;
      outline: none;
      font-family: var(--sans);
      font-size: 15px;
      color: var(--text-primary);
      min-width: 0;
    }
    .email-input input::placeholder { color: rgba(255,255,255,0.25); }

    .email-submit {
      background: none;
      border: none;
      color: var(--accent);
      font-family: var(--sans);
      font-size: 18px;
      cursor: pointer;
      padding: 0 4px;
      transition: opacity 100ms linear;
    }
    .email-submit:hover { opacity: 0.7; }

    .email-hint {
      font-size: 12px;
      color: var(--text-secondary);
      letter-spacing: 0.01em;
    }

    /* Footer */
    footer {
      padding: 24px;
      display: flex;
      justify-content: space-between;
      align-items: center;
      font-size: 12px;
      color: var(--text-secondary);
      border-top: 1px solid var(--border);
    }
    .footer-links { display: flex; gap: 24px; }
    footer a { color: var(--text-secondary); text-decoration: none; transition: opacity 100ms linear; }
    footer a:hover { opacity: 0.7; }

    @media (min-width: 768px) {
      nav { padding: 24px 40px; }
      .hero { padding: 100px 40px 80px; }
    }
  </style>
</head>
<body>

  <nav>
    <a class="wordmark" href="/">Circuit</a>
    <div class="nav-links">
      <a href="https://instagram.com/circuit.fm" aria-label="Instagram">
        <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="1.5" stroke-linecap="round" stroke-linejoin="round">
          <rect x="2" y="2" width="20" height="20" rx="5"/>
          <circle cx="12" cy="12" r="5"/>
          <circle cx="17.5" cy="6.5" r="1" fill="currentColor" stroke="none"/>
        </svg>
      </a>
    </div>
  </nav>

  <!-- HERO — the entire page. Signal-only. Per CIRCUIT_FM_DESIGN_BRIEF.md §B.1. -->
  <div class="hero">
    <h1 class="headline">
      <div class="brand-ring-scene" aria-hidden="true">
        <div class="brand-ring"></div>
      </div>
      <span class="brand">Circuit</span>
      <span class="subline">A members' club with no house. It moves with you.</span>
      <span class="supporting">Tap in at any venue. See who's here. Connect if you want to.</span>
    </h1>
    <div class="email-wrap" id="hero-email">
      <button class="join-btn" id="join-btn" type="button">Get on the list</button>
      <div class="email-reveal" id="email-reveal">
        <form class="email-input" id="email-form">
          <input type="email" id="email" placeholder="you@email.com" autocomplete="email" required>
          <button type="submit" class="email-submit" id="email-submit">→</button>
        </form>
        <span class="email-hint">Curated outings. Member-only access. London 2026.</span>
      </div>
    </div>
  </div>

  <footer>
    <span>&copy; 2026</span>
    <div class="footer-links">
      <a href="/privacy">Privacy</a>
      <a href="/terms">Terms</a>
    </div>
  </footer>

  <script>
    // Read voucher_id from ?v= query param
    const voucherId = new URLSearchParams(window.location.search).get('v') || '';

    function setupEmailForm(btnId, revealId, formId, inputId) {
      const btn = document.getElementById(btnId);
      const reveal = document.getElementById(revealId);
      const form = document.getElementById(formId);
      const input = document.getElementById(inputId);

      btn.addEventListener('click', () => {
        btn.classList.add('hidden');
        reveal.classList.add('active');
        input.focus();
      });

      form.addEventListener('submit', async (e) => {
        e.preventDefault();
        const email = input.value.trim();
        if (!email) return;
        const submitBtn = form.querySelector('.email-submit');
        submitBtn.textContent = '...';
        try {
          const signupPromise = fetch('/api/signup', {
            method: 'POST',
            headers: { 'Content-Type': 'application/json' },
            body: JSON.stringify({ email }),
          });
          const vouchPromise = voucherId
            ? fetch('/api/vouch', {
                method: 'POST',
                headers: { 'Content-Type': 'application/json' },
                body: JSON.stringify({ voucher_id: voucherId, email }),
              }).catch(() => null)
            : Promise.resolve(null);

          const [signupRes] = await Promise.all([signupPromise, vouchPromise]);
          if (!signupRes.ok) throw new Error('signup failed');
          const result = await signupRes.json();
          const msg = result.duplicate
            ? "You're already on the list."
            : "You're on the list.";
          reveal.innerHTML = '<span class="email-hint">' + msg + '</span>';
        } catch (err) {
          console.error(err);
          submitBtn.textContent = '→';
        }
      });
    }

    setupEmailForm('join-btn', 'email-reveal', 'email-form', 'email');
  </script>
</body>
</html>
