<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Culture Club</title>
  <meta name="description" content="A members' club with no house. We go to culture together.">
  <meta property="og:title" content="Culture Club">
  <meta property="og:description" content="A members' club with no house. We go to culture together.">
  <link rel="icon" href="data:image/svg+xml,<svg xmlns='http://www.w3.org/2000/svg' viewBox='0 0 100 100'><rect width='100' height='100' rx='50' fill='%23FF4400'/></svg>">
  <style>
    *, *::before, *::after {
      margin: 0;
      padding: 0;
      box-sizing: border-box;
    }

    :root {
      --bg: #000000;
      --text-primary: #FFFFFF;
      --text-secondary: #A0A0A0;
      --accent: #FF4400;
      --accent-dim: rgba(255, 68, 0, 0.3);
      --mono: "SF Mono", "JetBrains Mono", "Fira Code", monospace;
      --sans: "Inter", "Helvetica Neue", "Arial", sans-serif;
    }

    html, body {
      height: 100%;
      overflow: hidden;
    }

    body {
      background: var(--bg);
      color: var(--text-primary);
      font-family: var(--mono);
      -webkit-font-smoothing: antialiased;
      -moz-osx-font-smoothing: grayscale;
    }

    .page {
      height: 100vh;
      height: 100dvh;
      display: flex;
      flex-direction: column;
      padding: 24px;
    }

    /* Nav */
    nav {
      display: flex;
      justify-content: space-between;
      align-items: center;
      flex-shrink: 0;
    }

    .wordmark {
      font-size: 18px;
      font-weight: 600;
      color: var(--text-primary);
      letter-spacing: -0.02em;
    }

    .nav-links {
      display: flex;
      align-items: center;
      gap: 24px;
    }

    .nav-links a {
      color: var(--text-primary);
      text-decoration: none;
      font-family: var(--mono);
      font-size: 14px;
      font-weight: 400;
      transition: opacity 100ms linear;
    }

    .nav-links a:hover {
      opacity: 0.7;
    }

    .nav-links a svg {
      display: block;
      width: 18px;
      height: 18px;
    }

    /* Hero */
    .hero {
      flex: 1;
      display: flex;
      flex-direction: column;
      justify-content: center;
      align-items: center;
      text-align: center;
      gap: 80px;
    }

    .headline {
      display: flex;
      flex-direction: column;
      align-items: center;
      gap: 0;
      font-size: clamp(12px, 3.6vw, 48px);
      font-weight: 400;
      line-height: 1.6;
      text-transform: lowercase;
      width: 100%;
    }

    .line1, .line2 {
      text-align: center;
      white-space: nowrap;
    }

    .pill {
      display: inline-block;
      background: var(--accent);
      border: none;
      border-radius: 2px;
      padding: 0 0.5em;
      vertical-align: bottom;
      overflow: hidden;
      height: 1.5em;
      line-height: 1.5em;
    }

    .pill-inner {
      display: block;
      transition: transform 400ms cubic-bezier(0.34, 1.56, 0.64, 1);
    }

    .pill-text {
      display: block;
      white-space: nowrap;
      height: 1.5em;
      line-height: 1.5em;
      text-align: center;
    }

    .cta {
      display: inline-flex;
      align-items: center;
      justify-content: center;
      background: var(--accent);
      color: var(--bg);
      font-family: var(--mono);
      font-size: 16px;
      font-weight: 600;
      text-decoration: none;
      border: none;
      border-radius: 2px;
      padding: 0 32px;
      height: 48px;
      min-height: 44px;
      cursor: pointer;
      transition: opacity 100ms linear;
    }

    .cta:hover {
      opacity: 0.85;
    }

    /* Footer */
    footer {
      flex-shrink: 0;
      text-align: center;
      padding-bottom: 16px;
      font-family: var(--mono);
      font-size: 12px;
      color: var(--text-secondary);
    }

    footer a {
      color: var(--text-secondary);
      text-decoration: none;
      transition: opacity 100ms linear;
    }

    footer a:hover {
      opacity: 0.7;
    }

    /* About overlay */
    .about-overlay {
      position: fixed;
      inset: 0;
      background: #000000;
      display: flex;
      align-items: center;
      justify-content: center;
      opacity: 0;
      pointer-events: none;
      transition: opacity 100ms linear;
      z-index: 10;
    }

    .about-overlay.active {
      opacity: 1;
      pointer-events: auto;
    }

    .about-content {
      font-family: var(--mono);
      font-size: 16px;
      font-weight: 400;
      color: var(--text-primary);
      text-transform: lowercase;
      text-align: center;
      max-width: 480px;
      line-height: 1.8;
      padding: 24px;
    }

    .about-content p + p {
      margin-top: 1.5em;
    }

    /* Desktop */
    @media (min-width: 768px) {
      .page {
        padding: 32px 40px;
      }

      .about-content {
        font-size: 18px;
      }

      .hero {
        gap: 100px;
      }

      .cta {
        font-size: 18px;
        height: 52px;
        padding: 0 40px;
      }
    }

  </style>
</head>
<body>
  <div class="page">
    <nav>
      <span class="wordmark">Culture Club</span>
      <div class="nav-links">
        <a href="#" id="about-link">about</a>
        <a href="#" aria-label="Instagram">
          <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="1.5" stroke-linecap="round" stroke-linejoin="round">
            <rect x="2" y="2" width="20" height="20" rx="5"/>
            <circle cx="12" cy="12" r="5"/>
            <circle cx="17.5" cy="6.5" r="1" fill="currentColor" stroke="none"/>
          </svg>
        </a>
      </div>
    </nav>

    <main class="hero">
      <h1 class="headline">
        <span class="line1">a members' club with no house.</span>
        <span class="line2">we go to <span class="pill"><span class="pill-inner" id="pill-inner"><span class="pill-text">film screenings</span><span class="pill-text" id="next-text"></span></span></span> together.</span>
      </h1>
      <a class="cta" href="https://chat.whatsapp.com/">Join the club →</a>
    </main>

    <footer>
      Powered by <a href="https://circuitapp.co">Circuit</a>
    </footer>
  </div>

  <div class="about-overlay" id="about-overlay">
    <div class="about-content">
      <p>no building. no annual fee. no waitlist.</p>
      <p>your membership is how many times you show up.<br>we track it. you keep the receipts.</p>
    </div>
  </div>

  <script>
    const items = [
      'film screenings',
      'comedy nights',
      'supper clubs',
      'gallery openings',
      'run clubs',
      'late-night jazz',
      'spoken word',
      'open studios'
    ];
    let index = 0;
    const inner = document.getElementById('pill-inner');
    const currentText = inner.children[0];
    const nextText = inner.children[1];
    const pill = inner.parentElement;

    // Measure widest item and fix pill width
    let maxW = 0;
    const original = currentText.textContent;
    for (const item of items) {
      currentText.textContent = item;
      maxW = Math.max(maxW, currentText.scrollWidth);
    }
    currentText.textContent = original;
    pill.style.width = (maxW + 1) + 'px';

    setInterval(() => {
      index = (index + 1) % items.length;
      nextText.textContent = items[index];
      const h = pill.offsetHeight;
      inner.style.transform = 'translateY(-' + h + 'px)';

      setTimeout(() => {
        inner.style.transition = 'none';
        inner.style.transform = 'translateY(0)';
        currentText.textContent = items[index];
        inner.offsetHeight;
        inner.style.transition = 'transform 400ms cubic-bezier(0.34, 1.56, 0.64, 1)';
      }, 420);
    }, 2500);

    // About modal
    const overlay = document.getElementById('about-overlay');
    document.getElementById('about-link').addEventListener('click', (e) => {
      e.preventDefault();
      overlay.classList.add('active');
    });
    overlay.addEventListener('click', (e) => {
      if (!e.target.closest('.about-content')) {
        overlay.classList.remove('active');
      }
    });
  </script>
</body>
</html>
