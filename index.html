<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Culture Club</title>
  <meta name="description" content="A members' club with no house. We go to culture together.">
  <meta property="og:title" content="Culture Club">
  <meta property="og:description" content="A members' club with no house. We go to culture together.">
  <link rel="icon" href="data:image/svg+xml,<svg xmlns='http://www.w3.org/2000/svg' viewBox='0 0 100 100'><rect width='100' height='100' rx='50' fill='%23FF4400'/></svg>">
  <style>
    *, *::before, *::after {
      margin: 0;
      padding: 0;
      box-sizing: border-box;
    }

    :root {
      --bg: #000000;
      --text-primary: #FFFFFF;
      --text-secondary: #A0A0A0;
      --accent: #FF4400;
      --accent-dim: rgba(255, 68, 0, 0.3);
      --mono: "SF Mono", "JetBrains Mono", "Fira Code", monospace;
      --sans: "Inter", "Helvetica Neue", "Arial", sans-serif;
    }

    html, body {
      height: 100%;
      overflow: hidden;
    }

    body {
      background: var(--bg);
      color: var(--text-primary);
      font-family: var(--mono);
      -webkit-font-smoothing: antialiased;
      -moz-osx-font-smoothing: grayscale;
    }

    .page {
      height: 100vh;
      height: 100dvh;
      display: flex;
      flex-direction: column;
      padding: 24px;
    }

    /* Nav */
    nav {
      display: flex;
      justify-content: space-between;
      align-items: center;
      flex-shrink: 0;
    }

    .wordmark {
      font-size: 18px;
      font-weight: 600;
      color: var(--text-primary);
      letter-spacing: -0.02em;
    }

    .nav-links {
      display: flex;
      align-items: center;
      gap: 24px;
    }

    .nav-links a {
      color: var(--text-primary);
      text-decoration: none;
      font-family: var(--mono);
      font-size: 14px;
      font-weight: 400;
      transition: opacity 100ms linear;
    }

    .nav-links a:hover {
      opacity: 0.7;
    }

    .nav-links a svg {
      display: block;
      width: 18px;
      height: 18px;
    }

    /* Hero */
    .hero {
      flex: 1;
      display: flex;
      flex-direction: column;
      justify-content: center;
      align-items: center;
      text-align: center;
      gap: 80px;
    }

    .headline {
      display: flex;
      flex-direction: column;
      align-items: center;
      gap: 0;
      font-size: clamp(12px, 3.6vw, 48px);
      font-weight: 400;
      line-height: 1.6;
      text-transform: lowercase;
      width: 100%;
    }

    .line1, .line2 {
      text-align: center;
      white-space: nowrap;
    }

    .pill {
      background: var(--accent);
      border-radius: 2px;
      padding: 0.05em 0.35em;
      position: relative;
      display: inline;
    }

    .pill-text {
      transition: opacity 300ms cubic-bezier(0.34, 1.56, 0.64, 1);
    }

    .phone-wrap {
      display: flex;
      flex-direction: column;
      align-items: center;
      gap: 12px;
    }

    .phone-input {
      display: flex;
      align-items: center;
      border: 1px solid var(--accent-dim);
      border-radius: 2px;
      background: rgba(255, 255, 255, 0.05);
      height: 48px;
      min-height: 44px;
      max-width: 360px;
      width: 100%;
      padding: 0 16px;
      gap: 12px;
    }

    .phone-prefix {
      display: flex;
      align-items: center;
      gap: 8px;
      font-family: var(--mono);
      font-size: 16px;
      color: var(--text-secondary);
      white-space: nowrap;
      flex-shrink: 0;
    }

    .phone-prefix .flag {
      font-size: 18px;
      line-height: 1;
    }

    .phone-input input {
      flex: 1;
      background: none;
      border: none;
      outline: none;
      font-family: var(--mono);
      font-size: 16px;
      color: var(--text-primary);
      min-width: 0;
    }

    .phone-input input::placeholder {
      color: rgba(255, 255, 255, 0.25);
    }

    .phone-hint {
      font-family: var(--mono);
      font-size: 12px;
      color: var(--text-secondary);
    }

    /* Footer */
    footer {
      flex-shrink: 0;
      text-align: center;
      padding-bottom: 16px;
      font-family: var(--mono);
      font-size: 12px;
      color: var(--text-secondary);
    }

    footer a {
      color: var(--text-secondary);
      text-decoration: none;
      transition: opacity 100ms linear;
    }

    footer a:hover {
      opacity: 0.7;
    }

    /* About overlay */
    .about-overlay {
      position: fixed;
      inset: 0;
      background: #000000;
      display: flex;
      align-items: center;
      justify-content: center;
      opacity: 0;
      pointer-events: none;
      transition: opacity 100ms linear;
      z-index: 10;
    }

    .about-overlay.active {
      opacity: 1;
      pointer-events: auto;
    }

    .about-content {
      font-family: var(--mono);
      font-size: clamp(11px, 2.8vw, 18px);
      font-weight: 400;
      color: var(--text-primary);
      text-transform: lowercase;
      text-align: center;
      line-height: 2;
      padding: 24px;
      white-space: nowrap;
    }

    .about-content p + p {
      margin-top: 1.5em;
    }

    /* Desktop */
    @media (min-width: 768px) {
      .page {
        padding: 32px 40px;
      }

      .hero {
        gap: 100px;
      }
    }

  </style>
</head>
<body>
  <div class="page">
    <nav>
      <span class="wordmark">Culture Club</span>
      <div class="nav-links">
        <a href="#" id="about-link">about</a>
        <a href="#" aria-label="Instagram">
          <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="1.5" stroke-linecap="round" stroke-linejoin="round">
            <rect x="2" y="2" width="20" height="20" rx="5"/>
            <circle cx="12" cy="12" r="5"/>
            <circle cx="17.5" cy="6.5" r="1" fill="currentColor" stroke="none"/>
          </svg>
        </a>
      </div>
    </nav>

    <main class="hero">
      <h1 class="headline">
        <span class="line1">a members' club with no house.</span>
        <span class="line2">we go to <span class="pill"><span class="pill-text" id="rotating">film screenings</span></span> together.</span>
      </h1>
      <div class="phone-wrap">
        <form class="phone-input" id="phone-form">
          <span class="phone-prefix"><span class="flag">🇬🇧</span> +44</span>
          <input type="tel" id="phone" placeholder="22 2222 2222" autocomplete="tel">
        </form>
        <span class="phone-hint">enter your number to join.</span>
      </div>
    </main>

    <footer>
      <a href="https://meetcircuit.com">Circuit</a>
    </footer>
  </div>

  <div class="about-overlay" id="about-overlay">
    <div class="about-content">
      <p>a members' club with no house.</p>
      <p>no building. no dress code.</p>
      <p>just culture, together.</p>
      <p>enter your number. we'll be in touch.</p>
    </div>
  </div>

  <script>
    const items = [
      'film screenings',
      'comedy nights',
      'supper clubs',
      'gallery openings',
      'run clubs',
      'late-night jazz',
      'spoken word',
      'open studios'
    ];
    let index = 0;
    const el = document.getElementById('rotating');

    setInterval(() => {
      index = (index + 1) % items.length;
      el.style.opacity = '0';
      setTimeout(() => {
        el.textContent = items[index];
        el.style.opacity = '1';
      }, 150);
    }, 2500);

    // Phone form
    document.getElementById('phone-form').addEventListener('submit', (e) => {
      e.preventDefault();
      const num = document.getElementById('phone').value.trim();
      if (num) console.log('+44 ' + num);
    });

    // About modal
    const overlay = document.getElementById('about-overlay');
    document.getElementById('about-link').addEventListener('click', (e) => {
      e.preventDefault();
      overlay.classList.add('active');
    });
    overlay.addEventListener('click', (e) => {
      if (!e.target.closest('.about-content')) {
        overlay.classList.remove('active');
      }
    });
  </script>
</body>
</html>
