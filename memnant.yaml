project:
  name: cccircuit
  id: a7362301-a66e-45f4-9584-d6e1f5bc72c0
memory:
  db_path: .memnant/ledger.db
  export_path: .memnant/export/
  snapshot_interval: monthly
  max_spec_snapshots: 5
  max_codebase_snapshots: 3
orchestrator:
  tiers:
    triage:
      provider: anthropic
      model: claude-haiku-4-5-20251001
      max_context_tokens: 2000
    analysis:
      provider: anthropic
      model: claude-sonnet-4-5-20250929
      max_context_tokens: 8000
    build:
      provider: anthropic
      model: claude-opus-4-6
      max_context_tokens: 32000
  interfaces:
    telegram:
      enabled: false
    cli:
      enabled: true
    mcp:
      enabled: true
      port: 3100
governor:
  docs_path: docs/
  lint_on_pr: true
  strict_mode: false
security:
  staging_only: true
  allow_deploy: false
  allowed_mcp_tools: []
